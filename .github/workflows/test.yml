name: Test Suite

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
    - name: Install dependencies
      run: npm install
    - name: Lint check
      run: npm run lint

  test-quick:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
    - name: Install dependencies
      run: npm install
    - name: Quick test
      run: npm test
      env:
        DISABLE_EMBEDDING_SERVER: '1'

  test-standards:
    runs-on: ubuntu-latest
    needs: test-quick
    steps:
    - uses: actions/checkout@v4
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
    - name: Install dependencies
      run: npm install
    - name: DLP test
      run: node test/test_dlp.mjs
      env:
        DISABLE_EMBEDDING_SERVER: '1'
    - name: OWASP LLM Top 10
      run: node test/test_owasp_top10.mjs
      env:
        DISABLE_EMBEDDING_SERVER: '1'
    - name: MITRE ATLAS
      run: node test/test_mitre_atlas.mjs
      env:
        DISABLE_EMBEDDING_SERVER: '1'
    - name: Adversarial
      run: node test/test_adversarial.mjs
      env:
        DISABLE_EMBEDDING_SERVER: '1'
    - name: Multi-step
      run: node test/test_multi_step.mjs
      env:
        DISABLE_EMBEDDING_SERVER: '1'
